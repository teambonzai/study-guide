<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Study Guide — ACC Nursing</title>
<style>
  :root{--bg:#f4f7f6;--panel:#fff;--panel2:#eef4f2;--ink:#152825;--muted:#5a726c;--line:#e5ece9;--accent:#0d9488;--accent2:#0f766e;--chip:#e6f4f1}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  svg.i{width:1em;height:1em;vertical-align:-.14em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  main{max-width:760px;margin:0 auto;padding:44px 20px 90px}
  .brand{display:flex;align-items:center;gap:13px;margin-bottom:6px}
  .brand svg.i{width:34px;height:34px;color:var(--accent)}
  h1{font-size:27px;margin:0;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:14.5px;margin:2px 0 34px}
  .course{margin:0 0 30px}
  .course h2{font-size:13px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent2);font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px}
  .course h2 svg.i{width:16px;height:16px}
  a.lecture{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:10px 0;box-shadow:0 1px 3px rgba(20,50,45,.06);
    transition:box-shadow .16s,transform .16s,border-color .16s}
  a.lecture:hover{box-shadow:0 8px 22px rgba(20,50,45,.13);transform:translateY(-2px);border-color:#cfe0dc}
  a.lecture .ic{width:44px;height:44px;border-radius:12px;background:var(--chip);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  a.lecture .ic svg.i{width:22px;height:22px}
  a.lecture .tx{flex:1;min-width:0}
  a.lecture .tx b{display:block;font-size:16.5px;font-weight:700}
  a.lecture .tx small{color:var(--muted);font-size:13px}
  a.lecture .go{color:var(--muted);flex-shrink:0}
  a.lecture:hover .go{color:var(--accent)}
  .note{background:var(--chip);border-radius:12px;padding:13px 16px;color:var(--accent2);font-size:13.5px;line-height:1.55;margin-top:26px;display:flex;gap:10px;align-items:flex-start}
  .note svg.i{width:17px;height:17px;flex-shrink:0;margin-top:2px}
  .foot{color:var(--muted);font-size:12.5px;margin-top:30px;text-align:center}
</style>
</head>
<body>
<main>
  <div class="brand"><svg class="i"><use href="#i-shield"/></svg><h1>Study Guide</h1></div>
  <div class="sub">Interactive study aids · Nursing program, Austin Community College</div>

  <div class="course">
    <h2><svg class="i"><use href="#i-flask"/></svg>Microbiology (BIOL 2420)</h2>
    <a class="lecture" href="courses/microbiology-biol2420/01-immune-response/index.html">
      <span class="ic"><svg class="i"><use href="#i-shieldcheck"/></svg></span>
      <span class="tx"><b>Immune Response &amp; Complement</b></span>
      <span class="go"><svg class="i"><use href="#i-arrow"/></svg></span>
    </a>
    <a class="lecture" href="courses/microbiology-biol2420/02-determinants-of-health/index.html">
      <span class="ic"><svg class="i"><use href="#i-shieldcheck"/></svg></span>
      <span class="tx"><b>Determinants of Health &amp; Disease</b></span>
      <span class="go"><svg class="i"><use href="#i-arrow"/></svg></span>
    </a>
    <a class="lecture" href="courses/microbiology-biol2420/03-epidemiology/index.html">
      <span class="ic"><svg class="i"><use href="#i-shieldcheck"/></svg></span>
      <span class="tx"><b>Epidemiology</b></span>
      <span class="go"><svg class="i"><use href="#i-arrow"/></svg></span>
    </a>
    <a class="lecture" href="courses/microbiology-biol2420/04-control-of-microorganisms/index.html">
      <span class="ic"><svg class="i"><use href="#i-shieldcheck"/></svg></span>
      <span class="tx"><b>Control of Microorganisms</b></span>
      <span class="go"><svg class="i"><use href="#i-arrow"/></svg></span>
    </a>
  </div>

  <div class="foot">Progress is saved per device in your browser.</div>
</main>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
<symbol id="i-trend" viewBox="0 0 24 24"><path d="M16 7h6v6"/><path d="m22 7-8.5 8.5-5-5L2 17"/></symbol>
<symbol id="i-shield" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></symbol>
<symbol id="i-shieldcheck" viewBox="0 0 24 24"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></symbol>
<symbol id="i-flask" viewBox="0 0 24 24"><path d="M10 2v7.31l-4.6 7.97A2 2 0 0 0 7.13 20h9.74a2 2 0 0 0 1.73-2.72L14 9.31V2"/><path d="M8.5 2h7"/><path d="M7 16h10"/></symbol>
<symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></symbol>
<symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></symbol>
<symbol id="i-layers" viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></symbol>
</defs></svg>
</body>
</html>
